name: Build demo APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > androidApp/google-services.json

      - name: Restore TmdbConfig.kt
        run: |
          mkdir -p shared/src/commonMain/kotlin/com/example/tvtimeneverdie/config
          cat > shared/src/commonMain/kotlin/com/example/tvtimeneverdie/config/TmdbConfig.kt << 'EOF'
          package com.example.tvtimeneverdie.config

          object TmdbConfig {
              const val API_KEY = "${{ secrets.TMDB_API_KEY }}"
          }
          EOF

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvtimeneverdies-debug
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Publish demo release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Ultima build demo (debug)"
          prerelease: true
          files: androidApp/build/outputs/apk/debug/*.apk
